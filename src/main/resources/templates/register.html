<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rent.it - Join</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(-45deg, #000000, #200000, #400000, #000000);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
        }
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
        .flash-notification { animation: slideIn 0.3s ease-out forwards; }
        .flash-exit { animation: fadeOut 0.5s ease-in forwards; }
        #map { height: 200px; border-radius: 0.75rem; border: 1px solid rgba(255,255,255,0.1); }
        .leaflet-container { background: transparent !important; }
        .leaflet-tile { filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%); }
    </style>
</head>
<body class="text-white flex items-center justify-center min-h-screen p-6">
    
    <div id="flash-container" class="fixed top-6 right-6 z-[100] space-y-4 w-80"></div>

    <div class="w-full max-w-2xl space-y-8 border border-white/10 p-8 rounded-2xl bg-white/5 backdrop-blur-md shadow-2xl">
        <div class="text-center">
            <div class="w-12 h-12 bg-white rounded-full flex items-center justify-center mx-auto mb-4">
                <div class="w-4 h-4 bg-black"></div>
            </div>
            <h1 class="text-3xl font-light tracking-tight">Rent.it</h1>
            <p class="text-white/40 mt-2 text-sm">Join the community</p>
        </div>
        
        <form action="/register" method="POST" class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <!-- Left Column: Basic Info -->
                <div class="space-y-4">
                    <p class="text-xs uppercase tracking-widest text-white/40 font-semibold">Identity</p>
                    <div class="grid grid-cols-2 gap-4">
                        <input type="text" name="firstName" placeholder="First Name" required
                            class="bg-transparent border border-white/20 rounded-lg px-4 py-3 focus:outline-none focus:border-white transition-colors placeholder:text-white/20 text-sm">
                        <input type="text" name="lastName" placeholder="Last Name" required
                            class="bg-transparent border border-white/20 rounded-lg px-4 py-3 focus:outline-none focus:border-white transition-colors placeholder:text-white/20 text-sm">
                    </div>
                    <input type="text" name="username" placeholder="Username" required
                        class="w-full bg-transparent border border-white/20 rounded-lg px-4 py-3 focus:outline-none focus:border-white transition-colors placeholder:text-white/20 text-sm">
                    <input type="password" name="password" placeholder="Password" required
                        class="w-full bg-transparent border border-white/20 rounded-lg px-4 py-3 focus:outline-none focus:border-white transition-colors placeholder:text-white/20 text-sm">
                    
                    <p class="text-xs uppercase tracking-widest text-white/40 font-semibold pt-2">Role</p>
                    <div class="grid grid-cols-1 gap-3">
                        <label class="flex items-center space-x-3 p-3 border border-white/10 rounded-xl cursor-pointer hover:bg-white/5 transition-all has-[:checked]:border-white">
                            <input type="checkbox" name="isRenter" value="true" class="hidden peer" checked>
                            <div class="w-4 h-4 border border-white/30 rounded flex items-center justify-center peer-checked:bg-white peer-checked:border-white">
                                <svg class="w-3 h-3 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                            </div>
                            <span class="text-xs font-medium">Renter</span>
                        </label>
                        <label class="flex items-center space-x-3 p-3 border border-white/10 rounded-xl cursor-pointer hover:bg-white/5 transition-all has-[:checked]:border-white">
                            <input type="checkbox" name="isProvider" value="true" class="hidden peer">
                            <div class="w-4 h-4 border border-white/30 rounded flex items-center justify-center peer-checked:bg-white peer-checked:border-white">
                                <svg class="w-3 h-3 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                            </div>
                            <span class="text-xs font-medium">Provider</span>
                        </label>
                    </div>
                </div>

                <!-- Right Column: Location -->
                <div class="space-y-4">
                    <p class="text-xs uppercase tracking-widest text-white/40 font-semibold">Location (Drop a Pin)</p>
                    <div id="map"></div>
                    
                    <input type="text" id="street" name="street" placeholder="Street Address" required
                        class="w-full bg-transparent border border-white/20 rounded-lg px-4 py-3 focus:outline-none focus:border-white transition-colors placeholder:text-white/20 text-sm">
                    
                    <div class="grid grid-cols-2 gap-4">
                        <input type="text" id="city" name="city" placeholder="City" required
                            class="bg-transparent border border-white/20 rounded-lg px-4 py-3 focus:outline-none focus:border-white transition-colors placeholder:text-white/20 text-sm">
                        <input type="text" id="state" name="state" placeholder="State" required
                            class="bg-transparent border border-white/20 rounded-lg px-4 py-3 focus:outline-none focus:border-white transition-colors placeholder:text-white/20 text-sm">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <input type="text" id="zipCode" name="zipCode" placeholder="Zip Code" required
                            class="bg-transparent border border-white/20 rounded-lg px-4 py-3 focus:outline-none focus:border-white transition-colors placeholder:text-white/20 text-sm">
                        <input type="text" name="buildingNo" placeholder="Apt/Bldg #"
                            class="bg-transparent border border-white/20 rounded-lg px-4 py-3 focus:outline-none focus:border-white transition-colors placeholder:text-white/20 text-sm">
                    </div>
                </div>
            </div>

            <button type="submit" 
                class="w-full bg-white text-black font-medium py-4 rounded-lg hover:bg-white/90 transition-all active:scale-[0.98]">
                Create Account
            </button>
        </form>

        <div class="pt-4 border-t border-white/5 text-center">
            <a href="/login" class="text-xs text-white/40 hover:text-white transition-colors">Already have an account? Sign in</a>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script th:inline="javascript">
        // Map Logic
        const map = L.map('map').setView([37.3382, -121.8863], 13); // Default to San Jose
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let marker;
        map.on('click', async function(e) {
            const { lat, lng } = e.latlng;
            
            if (marker) map.removeLayer(marker);
            marker = L.marker([lat, lng]).addTo(map);

            // Reverse Geocoding using Nominatim (Free)
            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`);
                const data = await response.json();
                const addr = data.address;

                if (addr) {
                    document.getElementById('street').value = (addr.house_number ? addr.house_number + ' ' : '') + (addr.road || '');
                    document.getElementById('city').value = addr.city || addr.town || addr.village || '';
                    document.getElementById('state').value = addr.state || '';
                    document.getElementById('zipCode').value = addr.postcode || '';
                }
            } catch (err) {
                console.error("Geocoding failed", err);
            }
        });

        // Flash Logic
        function flash(message, type = 'success') {
            const container = document.getElementById('flash-container');
            const notification = document.createElement('div');
            const bgColor = type === 'success' ? 'bg-white' : 'bg-red-500';
            const textColor = type === 'success' ? 'text-black' : 'text-white';
            notification.className = `flash-notification ${bgColor} ${textColor} p-4 rounded-xl shadow-2xl flex items-center justify-between pointer-events-auto z-[1000]`;
            notification.innerHTML = `
                <span class="text-sm font-medium">${message}</span>
                <button onclick="this.parentElement.remove()" class="ml-4 opacity-50 hover:opacity-100">&times;</button>
            `;
            container.appendChild(notification);
            setTimeout(() => {
                notification.classList.add('flash-exit');
                setTimeout(() => notification.remove(), 500);
            }, 5000);
        }

        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('error')) flash(urlParams.get('error'), 'error');
    </script>
</body>
</html>
