<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rent.it - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(-45deg, #000000, #200000, #400000, #000000);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
        }
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
        .flash-notification { animation: slideIn 0.3s ease-out forwards; }
        .flash-exit { animation: fadeOut 0.5s ease-in forwards; }
    </style>
</head>
<body class="text-white flex items-center justify-center min-h-screen p-6">
    
    <!-- Flash Container -->
    <div id="flash-container" class="fixed top-6 right-6 z-[100] space-y-4 w-80"></div>

    <div class="w-full max-w-sm space-y-8 border border-white/10 p-8 rounded-2xl bg-white/5 backdrop-blur-md shadow-2xl">
        <div class="text-center">
            <div class="w-12 h-12 bg-white rounded-full flex items-center justify-center mx-auto mb-4">
                <div class="w-4 h-4 bg-black"></div>
            </div>
            <h1 class="text-3xl font-light tracking-tight">Rent.it</h1>
            <p class="text-white/40 mt-2 text-sm">Enter your username to continue</p>
        </div>
        
        <form action="/login" method="POST" class="space-y-4">
            <div class="space-y-4">
                <input type="text" name="username" placeholder="Username" required
                    class="w-full bg-transparent border border-white/20 rounded-lg px-4 py-3 focus:outline-none focus:border-white transition-colors placeholder:text-white/20">
                <input type="password" name="password" placeholder="Password" required
                    class="w-full bg-transparent border border-white/20 rounded-lg px-4 py-3 focus:outline-none focus:border-white transition-colors placeholder:text-white/20">
            </div>
            <button type="submit" 
                class="w-full bg-white text-black font-medium py-3 rounded-lg hover:bg-white/90 transition-all active:scale-[0.98]">
                Continue
            </button>
        </form>

        <div class="text-center pt-2">
            <a href="/register" class="text-sm text-white/20 hover:text-white transition-all duration-300 hover:[text-shadow:0_0_8px_rgba(255,255,255,0.5)]">
                New User? Sign up
            </a>
        </div>

        <div class="pt-4 border-t border-white/5 text-center">
            <p class="text-[10px] text-white/20 uppercase tracking-widest">Enterprise Appointment System</p>
        </div>
    </div>

    <script th:inline="javascript">
        function flash(message, type = 'success') {
            const container = document.getElementById('flash-container');
            const notification = document.createElement('div');
            const bgColor = type === 'success' ? 'bg-white' : 'bg-red-500';
            const textColor = type === 'success' ? 'text-black' : 'text-white';
            
            notification.className = `flash-notification ${bgColor} ${textColor} p-4 rounded-xl shadow-2xl flex items-center justify-between pointer-events-auto`;
            notification.innerHTML = `
                <span class="text-sm font-medium">${message}</span>
                <button onclick="this.parentElement.remove()" class="ml-4 opacity-50 hover:opacity-100">&times;</button>
            `;
            container.appendChild(notification);
            setTimeout(() => {
                notification.classList.add('flash-exit');
                setTimeout(() => notification.remove(), 500);
            }, 5000);
        }

        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('error')) {
            flash(urlParams.get('error'), 'error');
        }
    </script>
</body>
</html>
